name: Tests

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  lint:
    name: Static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: QuTech-Delft/GitHub-Actions/actions/python/tox-static-check@master
        with:
          python-version: 3.12
          poetry-version: 2.2.1
  unit-test:
    name: Unit testing
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-15-intel # runs x64
          - macos-15 # runs arm64
          - windows-latest
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
    runs-on: ${{ matrix.os }}
    env:
      PYTHON_KEYRING_BACKEND: keyring.backends.null.Keyring
    steps:
      - uses: actions/checkout@v6
      - uses: QuTech-Delft/GitHub-Actions/actions/python/tox-unit-test@master
        with:
          python-version: 3.12
          poetry-version: 2.2.1
  e2e-test:
    name: End to End testing
    runs-on: ubuntu-latest
    strategy:
      matrix:
        backend-name:
          - "Stubbed"
          - "QX emulator"
    env:
      E2E_USERNAME: ${{ secrets.e2e_username }}
      E2E_PASSWORD: ${{ secrets.e2e_password }}
      IDP_CLIENT_ID: ${{ secrets.idp_client_id }}
      IDP_URL: ${{ inputs.idp_url }}
      API_AUDIENCE: ${{ inputs.api_audience }}
      DEFAULT_HOST: ${{ inputs.default_host }}
    steps:
      - uses: actions/checkout@v4
      - uses: QuTech-Delft/GitHub-Actions/actions/python/e2e-tests@master
        with:
          python-version: ${{ inputs.python-version }}
          poetry-version: ${{ inputs.poetry-version }}
          e2e-path: ${{ inputs.e2e_path }}
          backend-name: ${{ matrix.backend-name }}

  complete:
    # see https://github.community/t/status-check-for-a-matrix-jobs/127354/7
    name: Report status
    needs: [lint, unit-test, e2e-test]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Check all job status
        # see https://docs.github.com/en/actions/reference/context-and-expression-syntax-for-github-actions#needs-context
        # see https://stackoverflow.com/a/67532120/4907315
        if: >-
          ${{
               contains(needs.*.result, 'failure')
            || contains(needs.*.result, 'cancelled')
            || contains(needs.*.result, 'skipped')
          }}
        run: exit 1
  auto-merge-dependabot:
    name: Auto merge dependabot PR
    needs: complete
    if: ${{ (github.event_name == 'pull_request') && (github.actor == 'dependabot[bot]') }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: QuTech-Delft/GitHub-Actions/actions/generic/auto-merge@master
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          merge-method: squash
